name: 打卡提醒推送

on:
  schedule:
  - cron: '0 0 * * 1-5'  # 北京时间 08:00（工作日）
  - cron: '0 10 * * 1-5'  # 北京时间 18:00（工作日）
  workflow_dispatch:  # 允许手动触发

jobs:
  push-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 上班提醒
        if: ${{ contains(fromJSON('["8","9","10","11"]'), format('{0}', github.event.schedule && fromJSON('{}') || 0)) }}
        run: |
          curl -sf "https://serverless-function-xcm3.vercel.app/api/cron?tokens=7960eaf5cb564505a9b545f7ffbbb448%2Cf41a4997eb8048e0ad0e092b8b69f7b8&title=%E6%89%93%E5%8D%A1%E6%8F%90%E9%86%92&forceType=morning&locationId=101181502&morningContent=%25E5%25AE%259D%25E8%25B4%259D%25EF%25BC%258C%25E6%2597%25A9%25E4%25B8%258A%25E5%25A5%25BD%25E5%2591%2580%7E%2520%25E2%2598%2580%25EF%25B8%258F%250A%25E8%25AE%25B0%25E5%25BE%2597%25E6%2589%2593%25E5%258D%25A1%25E4%25B8%258A%25E7%258F%25AD%25E5%2593%25A6%25EF%25BC%258C%25E6%2596%25B0%25E7%259A%2584%25E4%25B8%2580%25E5%25A4%25A9%25E5%258A%25A0%25E6%25B2%25B9%25EF%25BC%2581%250A%25E6%2588%2591%25E4%25BC%259A%25E4%25B8%2580%25E7%259B%25B4%25E6%2583%25B3%25E4%25BD%25A0%25E7%259A%2584%7E%2520%25F0%259F%2592%2595"

      - name: 下班提醒
        run: |
          # 根据北京时间判断上班/下班（直接用 forceType 或不传让服务端自动判断）
          HOUR=$(TZ=Asia/Shanghai date +%H)
          if [ "$HOUR" -lt 12 ]; then
            curl -sf "https://serverless-function-xcm3.vercel.app/api/cron?tokens=7960eaf5cb564505a9b545f7ffbbb448%2Cf41a4997eb8048e0ad0e092b8b69f7b8&title=%E6%89%93%E5%8D%A1%E6%8F%90%E9%86%92&forceType=morning&locationId=101181502&morningContent=%25E5%25AE%259D%25E8%25B4%259D%25EF%25BC%258C%25E6%2597%25A9%25E4%25B8%258A%25E5%25A5%25BD%25E5%2591%2580%7E%2520%25E2%2598%2580%25EF%25B8%258F%250A%25E8%25AE%25B0%25E5%25BE%2597%25E6%2589%2593%25E5%258D%25A1%25E4%25B8%258A%25E7%258F%25AD%25E5%2593%25A6%25EF%25BC%258C%25E6%2596%25B0%25E7%259A%2584%25E4%25B8%2580%25E5%25A4%25A9%25E5%258A%25A0%25E6%25B2%25B9%25EF%25BC%2581%250A%25E6%2588%2591%25E4%25BC%259A%25E4%25B8%2580%25E7%259B%25B4%25E6%2583%25B3%25E4%25BD%25A0%25E7%259A%2584%7E%2520%25F0%259F%2592%2595"
          else
            curl -sf "https://serverless-function-xcm3.vercel.app/api/cron?tokens=7960eaf5cb564505a9b545f7ffbbb448%2Cf41a4997eb8048e0ad0e092b8b69f7b8&title=%E6%89%93%E5%8D%A1%E6%8F%90%E9%86%92&forceType=evening&locationId=101181502&eveningContent=%25E5%25AE%259D%25E8%25B4%259D%25EF%25BC%258C%25E4%25B8%258B%25E7%258F%25AD%25E6%2597%25B6%25E9%2597%25B4%25E5%2588%25B0%25E5%2595%25A6%7E%2520%25F0%259F%258C%2599%250A%25E8%25AE%25B0%25E5%25BE%2597%25E6%2589%2593%25E5%258D%25A1%25E4%25B8%258B%25E7%258F%25AD%25EF%25BC%258C%25E4%25BB%258A%25E5%25A4%25A9%25E8%25BE%259B%25E8%258B%25A6%25E4%25BA%2586%25EF%25BC%2581%250A%25E5%259B%259E%25E5%25AE%25B6%25E5%25A5%25BD%25E5%25A5%25BD%25E4%25BC%2591%25E6%2581%25AF%25EF%25BC%258C%25E6%2588%2591%25E5%259C%25A8%25E7%25AD%2589%25E4%25BD%25A0%7E%2520%25F0%259F%2592%2596"
          fi