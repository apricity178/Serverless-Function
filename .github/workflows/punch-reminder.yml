name: 打卡提醒推送

on:
  schedule:
  - cron: '0 0 * * *'  # 北京时间 08:00（每日）
  - cron: '0 10 * * *'  # 北京时间 18:00（每日）
  workflow_dispatch:  # 允许手动触发

jobs:
  push-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 判断并推送
        run: |
          # 使用北京时间判断
          HOUR=$(TZ=Asia/Shanghai date +%H)
          echo "当前北京时间: $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M:%S')"
          echo "当前小时: $HOUR"
          
          if [ "$HOUR" -lt 12 ]; then
            # 上班时间（08:00-11:59）
            echo ">>> 执行上班提醒推送 <<<"
            curl -sf "https://serverless-function-xcm3.vercel.app/api/cron?tokens=7960eaf5cb564505a9b545f7ffbbb448,f41a4997eb8048e0ad0e092b8b69f7b8&title=%E6%89%93%E5%8D%A1%E6%8F%90%E9%86%92&forceType=morning&locationId=101181502&morningContent=%E5%AE%9D%E8%B4%9D%EF%BC%8C%E6%97%A9%E4%B8%8A%E5%A5%BD%E5%91%80%7E%20%E2%98%80%EF%B8%8F%0A%E8%AE%B0%E5%BE%97%E6%89%93%E5%8D%A1%E4%B8%8A%E7%8F%AD%E5%93%A6%EF%BC%8C%E6%96%B0%E7%9A%84%E4%B8%80%E5%A4%A9%E5%8A%A0%E6%B2%B9%EF%BC%81%0A%E6%88%91%E4%BC%9A%E4%B8%80%E7%9B%B4%E6%83%B3%E4%BD%A0%E7%9A%84%7E%20%F0%9F%92%95"
          else
            # 下班时间（12:00-23:59）
            echo ">>> 执行下班提醒推送 <<<"
            curl -sf "https://serverless-function-xcm3.vercel.app/api/cron?tokens=7960eaf5cb564505a9b545f7ffbbb448,f41a4997eb8048e0ad0e092b8b69f7b8&title=%E6%89%93%E5%8D%A1%E6%8F%90%E9%86%92&forceType=evening&locationId=101181502&eveningContent=%E5%AE%9D%E8%B4%9D%EF%BC%8C%E4%B8%8B%E7%8F%AD%E6%97%B6%E9%97%B4%E5%88%B0%E5%95%A6%7E%20%F0%9F%8C%99%0A%E8%AE%B0%E5%BE%97%E6%89%93%E5%8D%A1%E4%B8%8B%E7%8F%AD%EF%BC%8C%E4%BB%8A%E5%A4%A9%E8%BE%9B%E8%8B%A6%E4%BA%86%EF%BC%81%0A%E5%9B%9E%E5%AE%B6%E5%A5%BD%E5%A5%BD%E4%BC%91%E6%81%AF%EF%BC%8C%E6%88%91%E5%9C%A8%E7%AD%89%E4%BD%A0%7E%20%F0%9F%92%96"
          fi
          
          echo ""
          echo "推送完成!"
